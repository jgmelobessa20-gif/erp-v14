<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Contábil V14</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">

</head>
<body>

<div id="login">
   <h2>📊 ERP Contábil V14</h2>
   <p>Sistema de gestão financeira</p>

    <input id="usuario" placeholder="Usuário">

    <input id="senha"
    type="password"
    placeholder="Senha">

    <button onclick="login()">
        Entrar
    </button>

    <button onclick="cadastrar()">
        Criar conta
    </button>
</div>

<div id="sistema" style="display:none;">

    <div class="sidebar">
        <h2>ERP V14</h2>
        <button onclick="abrirTela('dashboard')">Dashboard</button>
        <button onclick="abrirTela('clientes')">Clientes</button>
        <button onclick="abrirTela('faturas')">Faturas</button>
        <button onclick="abrirTela('financeiro')">Financeiro</button>
        <button onclick="abrirTela('config')">Configurações</button>
    </div>

    <div id="dashboard" class="tela">
        <header>
            <h1>📊 ERP Contábil V14</h1>
            <p id="ultimaAtualizacao"></p>
        </header>

        <div class="cards">
            <div class="card"><h3>Clientes</h3><h2 id="kCli">0</h2></div>
            <div class="card"><h3>Faturas</h3><h2 id="kFat">0</h2></div>
            <div class="card"><h3>Receita</h3><h2 id="kRec">R$ 0,00</h2></div>
            <div class="card"><h3>Ticket Médio</h3><h2 id="kMedia">R$ 0,00</h2></div>
        </div>

        <div class="panel">
            <h2>Gráfico Financeiro</h2>
            <div class="grafico-box">
                <canvas id="grafico"></canvas>
            </div>
        </div>
    </div>

    <div id="clientes" class="tela" style="display:none;">
        <div class="panel">
            <h2>Cadastro de Clientes</h2>

            <input id="empresa" placeholder="Empresa">
            <input id="nome" placeholder="Nome">
            <input id="email" placeholder="Email">
            <input id="telefone" placeholder="Telefone">
            <input id="cpf" placeholder="CPF/CNPJ">

            <button onclick="salvarCliente()">Salvar Cliente</button>

            <br><br>

            <input id="buscarCliente" placeholder="Pesquisar Cliente" onkeyup="filtrarClientes()">
            <div id="listaClientes"></div>
        </div>
    </div>

    <div id="faturas" class="tela" style="display:none;">
        <div class="panel">
            <h2>Gerar Fatura</h2>

            <input id="clienteFatura" placeholder="Cliente">
            <input id="valorFatura" type="number" placeholder="Valor">
            <input id="vencimento" type="date">

            <select id="formaPagamento">
                <option>Pix</option>
                <option>Cartão</option>
                <option>Boleto</option>
            </select>

            <button onclick="salvarFatura()">Gerar Fatura</button>
        <button onclick="gerarPDF()">Gerar PDF das Faturas</button>
            <div id="listaFaturas"></div>
        </div>
    </div>

    <div id="financeiro" class="tela" style="display:none;">
    <div class="panel">
        <h2>Resumo Financeiro</h2>

        <p>Total Recebido: <span id="recebido">R$ 0,00</span></p>
        <p>Total Pendente: <span id="pendente">R$ 0,00</span></p>
        <p>Total de Faturas: <span id="totalFaturas">0</span></p>

        <button onclick="gerarRelatorioMensal()">
            Relatório Mensal
        </button>

    </div>
</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
